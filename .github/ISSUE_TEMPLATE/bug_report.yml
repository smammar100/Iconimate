name: Bug report
description: Report a problem with an icon, an animation, or the gallery.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields
        below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the problem.
      placeholder: The bell icon does not animate on hover.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to the gallery
        2. Hover the bell icon
        3. Nothing moves
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: icon
    attributes:
      label: Affected icon
      description: The name of the icon, if the bug is specific to one.
      placeholder: bell
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, and version.
      placeholder: Edge 120 on Windows 11
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or console output.
    validations:
      required: false
